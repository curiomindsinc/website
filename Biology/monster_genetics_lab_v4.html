<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Monster Genetics Lab</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Georgia, 'Times New Roman', serif; background: #f8f7f4; color: #1a1a1a; min-height: 100vh; }
#app { max-width: 1000px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

.lab-header { text-align: center; margin-bottom: 1.5rem; padding-bottom: 1.25rem; border-bottom: 1px solid #e0ddd6; }
.lab-header h1 { font-size: 27px; font-weight: 700; letter-spacing: -0.5px; }
.lab-header p { font-size: 14px; color: #666; margin-top: 5px; font-style: italic; }

.progress-bar-wrap { background: #e5e7eb; border-radius: 4px; height: 5px; margin-bottom: 1.25rem; }
.progress-bar-fill { background: linear-gradient(90deg,#7c3aed,#1e1b4b); height: 5px; border-radius: 4px; transition: width 0.4s; }

.level-bar { display: flex; gap: 5px; justify-content: center; margin-bottom: 1.25rem; flex-wrap: wrap; }
.level-btn { padding: 6px 13px; border-radius: 20px; border: 1.5px solid #d0ccc4; font-size: 12px; cursor: pointer; background: #fff; color: #666; transition: all 0.15s; font-family: inherit; }
.level-btn:hover { border-color: #7c3aed; color: #7c3aed; }
.level-btn.active { background: #7c3aed; border-color: #7c3aed; color: #fff; font-weight: 600; }
.level-btn.done { background: #f0fdf4; border-color: #16a34a; color: #15803d; }
.level-btn.adv { border-style: dashed; }
.level-btn.adv.active { background: #1e1b4b; border-color: #1e1b4b; border-style: solid; }

.game-area { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
@media (max-width: 660px) { .game-area { grid-template-columns: 1fr; } }

.panel { background: #fff; border: 1px solid #e0ddd6; border-radius: 12px; padding: 1.2rem; }
.panel.full { grid-column: 1 / -1; }
.panel h3 { font-size: 15px; font-weight: 600; margin-bottom: 12px; }

.badge-adv { display:inline-block; background:#1e1b4b; color:#c7d2fe; font-size:10px; padding:2px 9px; border-radius:20px; margin-left:7px; vertical-align:middle; }

.concept-box { background:#faf9ff; border-left:3px solid #7c3aed; border-radius:0 8px 8px 0; padding:11px 15px; margin-bottom:12px; font-size:13px; color:#444; line-height:1.65; }
.concept-box.adv-concept { background:#f0f0ff; border-left-color:#1e1b4b; }
.word-problem-box { background:#fffbeb; border:1px solid #fcd34d; border-radius:10px; padding:14px 16px; margin-bottom:14px; font-size:13.5px; line-height:1.82; }
.word-problem-box .wp-title { font-size:11px; text-transform:uppercase; letter-spacing:.07em; color:#92400e; margin-bottom:7px; font-weight:600; }
.word-problem-box strong { color:#7c3aed; }

.hint-text { font-size:13px; color:#888; margin-bottom:12px; font-style:italic; }

.legend { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:12px; }
.legend-item { display:flex; align-items:center; gap:5px; font-size:12px; color:#555; }
.legend-dot { width:12px; height:12px; border-radius:50%; border:1px solid rgba(0,0,0,.13); flex-shrink:0; }

/* Allele picker */
.picker-section { margin-bottom:14px; }
.picker-label { font-size:12px; color:#888; text-transform:uppercase; letter-spacing:.05em; margin-bottom:7px; }
.picker-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.allele-btn { display:inline-flex; align-items:center; justify-content:center; min-width:42px; height:42px; padding:0 10px; border-radius:21px; font-size:14px; font-weight:700; cursor:grab; border:2px solid; font-family:Georgia,serif; transition:transform .1s,box-shadow .1s; line-height:1; }
.allele-btn:hover { transform:scale(1.08); box-shadow:0 2px 8px rgba(0,0,0,.12); }
.allele-btn:active { cursor:grabbing; transform:scale(1.1); }
.allele-btn.dominant  { background:#ede9fe; border-color:#7c3aed; color:#5b21b6; }
.allele-btn.recessive { background:#f3f4f6; border-color:#9ca3af; color:#374151; }
.allele-btn.sex-x     { background:#fce7f3; border-color:#db2777; color:#9d174d; }
.allele-btn.sex-y     { background:#eff6ff; border-color:#2563eb; color:#1e40af; }
.allele-btn.gamete    { background:#e0f2fe; border-color:#0284c7; color:#075985; }

/* Slots */
.slot-row { display:flex; align-items:center; gap:8px; margin-bottom:9px; flex-wrap:wrap; }
.slot-label { font-size:13px; color:#666; min-width:58px; }
.allele-slot { min-width:44px; height:44px; padding:0 8px; border-radius:22px; border:2px dashed #d1d5db; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; transition:all .15s; font-family:Georgia,serif; white-space:nowrap; }
.allele-slot.f-dom { background:#ede9fe; border:2px solid #7c3aed; color:#5b21b6; }
.allele-slot.f-rec { background:#f3f4f6; border:2px solid #9ca3af; color:#374151; }
.allele-slot.f-x   { background:#fce7f3; border:2px solid #db2777; color:#9d174d; }
.allele-slot.f-y   { background:#eff6ff; border:2px solid #2563eb; color:#1e40af; }
.allele-slot.f-gam { background:#e0f2fe; border:2px solid #0284c7; color:#075985; }
.allele-slot.drag-over { background:#f0fdf4; border-color:#16a34a; }
.clear-btn { background:#fff; color:#666; border:1px solid #d1d5db; padding:4px 13px; border-radius:20px; font-size:12px; cursor:pointer; margin-top:4px; font-family:inherit; }
.clear-btn:hover { border-color:#888; }

/* Punnett */
.punnett-wrap { margin-top:14px; overflow-x:auto; }
.section-label { font-size:11px; color:#9ca3af; text-transform:uppercase; letter-spacing:.06em; margin-bottom:6px; }
.punnett-table { border-collapse:collapse; width:100%; }
.punnett-table td,.punnett-table th { text-align:center; padding:7px 4px; border:1px solid #e5e7eb; font-size:12px; font-family:Georgia,serif; font-weight:600; }
.punnett-table th { background:#f9fafb; font-size:11px; color:#6b7280; }
.punnett-table td { background:#fff; height:46px; min-width:60px; font-size:11px; }
.punnett-table td.c-purple   { background:#ede9fe; color:#5b21b6; }
.punnett-table td.c-lavender { background:#f5f3ff; color:#6d28d9; }
.punnett-table td.c-white    { background:#f9fafb; color:#6b7280; }
.punnett-table td.c-sex      { background:#fdf4ff; color:#7e22ce; }
.punnett-table td.c-filled   { background:#faf5ff; color:#5b21b6; }
.punnett-table td.c-dihybrid { background:#f0fdf4; color:#166534; }

.offspring-grid { display:flex; flex-wrap:wrap; gap:10px; margin-top:8px; }
.offspring-card { display:flex; flex-direction:column; align-items:center; gap:3px; }
.offspring-card span { font-size:10px; color:#888; font-family:Georgia,serif; font-weight:600; }

/* Question */
.question-wrap { margin-top:14px; border-top:1px solid #e5e7eb; padding-top:13px; }
.question-text { font-size:14px; color:#222; margin-bottom:9px; font-weight:600; line-height:1.5; }
.answer-select { padding:9px 11px; border-radius:8px; border:1px solid #d1d5db; font-size:13.5px; background:#fff; color:#1a1a1a; width:100%; margin-bottom:9px; font-family:inherit; cursor:pointer; }
.answer-select:focus { outline:2px solid #7c3aed; outline-offset:1px; }
.btn-submit { background:#7c3aed; color:#fff; border:none; padding:10px 22px; border-radius:8px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
.btn-submit:hover { background:#6d28d9; }
.btn-submit.adv-btn { background:#1e1b4b; }
.btn-submit.adv-btn:hover { background:#312e81; }

.feedback { margin-top:12px; padding:13px 15px; border-radius:10px; border:1px solid; }
.feedback.ok  { background:#f0fdf4; border-color:#86efac; }
.feedback.bad { background:#fff7ed; border-color:#fed7aa; }
.feedback h4 { font-size:14px; font-weight:700; margin-bottom:5px; }
.feedback.ok  h4 { color:#15803d; }
.feedback.bad h4 { color:#c2410c; }
.feedback p { font-size:13px; line-height:1.7; }
.feedback.ok  p { color:#166534; }
.feedback.bad p { color:#9a3412; }
.score-badge { display:inline-block; padding:2px 9px; border-radius:20px; font-size:11px; font-weight:600; margin-left:7px; }
.score-badge.ok  { background:#dcfce7; color:#15803d; }
.score-badge.bad { background:#fee2e2; color:#b91c1c; }

.cross-sym { font-size:20px; color:#9ca3af; }
.parent-display { display:flex; align-items:center; gap:14px; flex-wrap:wrap; margin-bottom:14px; }
.parent-card { text-align:center; }
.parent-card .plabel { font-size:11px; color:#888; margin-top:4px; }

.finish-panel { text-align:center; padding:2.5rem 1.5rem; }
.finish-panel h2 { font-size:24px; font-weight:700; margin-bottom:8px; }
.score-total { font-size:38px; font-weight:700; color:#7c3aed; }
.summary-row { display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px solid #f3f4f6; }

.sandbox-toggle { display:flex; align-items:center; gap:8px; margin-bottom:10px; cursor:pointer; user-select:none; font-size:13px; color:#7c3aed; font-weight:600; }
.sandbox-toggle svg { width:16px; height:16px; flex-shrink:0; }
.sandbox-section { border:1px dashed #c4b5fd; border-radius:10px; padding:14px; background:#faf9ff; }
</style>
</head>
<body>
<div id="app">
  <div class="lab-header">
    <h1>Monster Genetics Lab</h1>
    <p>Pick any alleles, experiment freely, and master the rules of inheritance</p>
    <p style="font-size:13px;color:#888;margin-top:8px;">Created by: <strong style="color:#1a1a1a">Mr Lau Chin Hang</strong> &nbsp;|&nbsp; Instagram: <a href="https://www.instagram.com/curiominds.inc" target="_blank" rel="noopener noreferrer" style="color:#7c3aed;text-decoration:none;font-weight:600;">@curiominds.inc</a></p>
  </div>
  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressBar" style="width:0%"></div></div>
  <div class="level-bar" id="levelBar"></div>
  <div id="main"></div>
</div>

<script>
// ── LEVELS ────────────────────────────────────────────────────────────────────
const LEVELS = [
  {
    id:0, title:"Level 1 — Dominant vs recessive", type:"punnett",
    concept:"Alleles come in two forms: dominant (uppercase) and recessive (lowercase). A dominant allele always shows in the phenotype. A recessive allele only shows when paired with another recessive allele.",
    trait:"fur", alleles:["P","p"],
    hint:"Try crossing two carriers (Pp × Pp). Fill in the Punnett square, then answer.",
    question:"In a Pp × Pp cross, how many offspring out of 4 will have white fur?",
    answer:1, choiceLabels:["0 — none","1 — one","2 — half","3 — three"],
    expOk:"White fur (pp) appears in exactly 1 of 4. Even though both parents look purple, hidden p alleles pair up — a classic 3:1 phenotype ratio.",
    expBad:"White fur needs pp. The Punnett square for Pp × Pp gives PP, Pp, Pp, pp — only 1 of 4 is pp."
  },
  {
    id:1, title:"Level 2 — Homozygous vs heterozygous", type:"punnett",
    concept:"Homozygous means both alleles are the same (PP or pp). Heterozygous means one of each (Pp). A carrier shows the dominant trait but can pass the recessive allele to offspring.",
    trait:"fur", alleles:["P","p"],
    hint:"Try crossing a homozygous dominant (PP) with a homozygous recessive (pp).",
    question:"In a PP × pp cross, what will ALL offspring look like?",
    answer:0, choiceLabels:["All purple fur — 100%","All white fur — 100%","Half purple, half white","3 purple : 1 white"],
    expOk:"All offspring are Pp — carriers. P is dominant so every one looks purple, even though they all carry a hidden p.",
    expBad:"Every offspring gets P from the PP parent and p from the pp parent, making all Pp. P is dominant → all purple."
  },
  {
    id:2, title:"Level 3 — Eye count trait", type:"punnett",
    concept:"The same rules apply to any gene. Eye count: four eyes (E) is dominant over two eyes (e).",
    trait:"eyes", alleles:["E","e"],
    hint:"Try crossing two Ee carriers and observe the offspring.",
    question:"In an Ee × Ee cross, what fraction of offspring will have two eyes?",
    answer:1, choiceLabels:["0 out of 4","1 out of 4","2 out of 4","3 out of 4"],
    expOk:"Only ee gives two eyes. Ee × Ee gives EE, Ee, Ee, ee — exactly 1 in 4 have two eyes.",
    expBad:"Only ee produces two eyes. The cross gives EE (4 eyes), Ee (4 eyes), Ee (4 eyes), ee (2 eyes) — 1 in 4."
  },
  {
    id:3, title:"Level 4 — Sex determination", type:"punnett",
    concept:"Females are XX; males are XY. Every egg carries X. Sperm carry X or Y — so the father determines the offspring's sex.",
    trait:"sex", alleles:["X","Y"],
    hint:"Try crossing a mother (XX) with a father (XY) and see the offspring.",
    question:"In an XX × XY cross, what is the probability of a female (XX) offspring?",
    answer:2, choiceLabels:["0% — always male","25%","50%","100% — always female"],
    expOk:"50:50! The egg always gives X. Sperm gives X → XX (female) or Y → XY (male). Equal chance each time.",
    expBad:"XX × XY gives two XX (daughters) and two XY (sons) — exactly 50:50. The father's sperm decides sex."
  },
  {
    id:4, title:"Level 5 — Independent assortment", type:"punnett",
    concept:"Traits sort independently — fur colour does not affect eye count. Mendel's Law of Independent Assortment: each gene follows the same rules separately.",
    trait:"combo", alleles:["P","p"],
    hint:"Cross two Pp monsters. Focus on how many different visible appearances (phenotypes) appear.",
    question:"In a Pp × Pp fur cross, how many phenotypes are possible?",
    answer:1, choiceLabels:["One — all look the same","Two — purple or white","Three — one per genotype","Four — one per cell"],
    expOk:"Two phenotypes! PP and Pp both look purple (P masks p). Only pp looks different. Genotype ≠ phenotype.",
    expBad:"There are 3 genotypes (PP, Pp, pp) but only 2 phenotypes — PP and Pp both appear purple. Only pp is visibly different."
  },
  {
    id:5, title:"Level 6 — Reverse genetics", type:"word", advanced:true,
    concept:"Now we work backwards: given what we observe in offspring, what must the parents' genotypes have been? This is how real geneticists reason.",
    wordProblem:`Two <strong>purple</strong> monsters mate and have four offspring: <strong>three purple, one white</strong>.<br><br>White fur (pp) can only appear if <strong>both parents carry at least one p allele</strong>.<br>Use the sandbox below to test different crosses — which one produces a 3:1 ratio?`,
    trait:"fur", alleles:["P","p"],
    question:"What must BOTH parents' genotypes be?",
    answer:1, choiceLabels:["PP × PP — both homozygous dominant","Pp × Pp — both heterozygous carriers","PP × Pp — one homozygous, one carrier","Pp × pp — one carrier, one white"],
    expOk:"Correct! The 3:1 ratio (3 purple : 1 white) is the hallmark of Pp × Pp. Only this cross can produce pp offspring in that ratio.",
    expBad:"A white offspring (pp) means both parents must carry p. The 3:1 ratio specifically signals Pp × Pp — try it in the sandbox!"
  },
  {
    id:6, title:"Level 7 — Deducing unknown genotypes", type:"word", advanced:true,
    concept:"A dominant phenotype does not always mean a homozygous genotype. Observing recessive offspring reveals hidden alleles in the parent.",
    wordProblem:`A <strong>purple monster (unknown genotype)</strong> mates with a <strong>white monster (pp)</strong>. They have 8 offspring: <strong>4 purple, 4 white</strong>.<br><br>If the purple parent were PP, what would ALL offspring look like?<br>Use the sandbox to test PP × pp and Pp × pp — which gives a 1:1 ratio?`,
    trait:"fur", alleles:["P","p"],
    question:"What is the purple parent's genotype?",
    answer:1, choiceLabels:["PP — homozygous dominant","Pp — heterozygous carrier","pp — impossible (it shows purple)","Cannot be determined"],
    expOk:"Correct! PP × pp gives ALL purple offspring. But we see 1:1 (half purple, half white) — that only happens in Pp × pp. The purple parent must be Pp.",
    expBad:"PP × pp gives ALL Pp offspring (all purple). A 1:1 ratio only comes from Pp × pp. The white offspring prove the purple parent carries a p. Try it in the sandbox!"
  },
  {
    id:7, title:"Level 8 — Incomplete dominance", type:"punnett", advanced:true,
    concept:"In incomplete dominance, neither allele fully dominates. The heterozygote (Pp) shows a BLEND: PP = purple, pp = white, Pp = lavender. This produces a 1:2:1 ratio instead of 3:1.",
    trait:"incomplete", alleles:["P","p"],
    hint:"Cross two Pp monsters (both lavender). Notice that three distinct colours appear in the offspring.",
    question:"In an incomplete dominance Pp × Pp cross, what is the phenotype ratio?",
    answer:2, choiceLabels:["All lavender — 4:0:0","Purple and white only — 3:1","Purple : Lavender : White — 1:2:1","Purple : Lavender : White — 2:1:1"],
    expOk:"1:2:1 is correct! PP = purple, Pp = lavender (blend), pp = white. The Punnett gives 1 PP : 2 Pp : 1 pp — three distinct phenotypes.",
    expBad:"With incomplete dominance, Pp shows a blend (lavender). Pp × Pp gives 1 PP (purple), 2 Pp (lavender), 1 pp (white) — a 1:2:1 ratio."
  },
  {
    id:8, title:"Level 9 — Dihybrid cross", type:"dihybrid", advanced:true,
    concept:"A dihybrid cross tracks two genes at once. Each parent produces four types of gametes by combining one allele from each gene independently: PE, Pe, pE, pe. The 4×4 Punnett square shows all 16 possible offspring combinations, producing a 9:3:3:1 phenotype ratio.",
    wordProblem:`Two monsters, both <strong>purple fur and four eyes</strong>, are crossed. Both parents are <strong>PpEe</strong> — heterozygous for both traits.<br><br>
Each parent produces four gamete types: <strong>PE, Pe, pE, pe</strong>.<br>
Drag the gametes into the Punnett square rows and columns to fill all 16 cells and see the offspring combinations.<br><br>
Out of 160 observed offspring: 90 purple+four eyes &bull; 30 purple+two eyes &bull; 30 white+four eyes &bull; 10 white+two eyes`,
    alleles:["PE","Pe","pE","pe"],
    question:"What fraction of all offspring are expected to have BOTH white fur AND two eyes?",
    answer:2, choiceLabels:["1/2 — half of all offspring","1/4 — one quarter","1/16 — one sixteenth","3/16 — three sixteenths"],
    expOk:"1/16 is correct. White fur (pp) = 1/4 probability. Two eyes (ee) = 1/4 probability. Since the genes are independent, multiply: 1/4 × 1/4 = 1/16. That predicts exactly 10 of 160 offspring — matching the observations!",
    expBad:"Treat each gene separately. Probability of pp from Pp×Pp = 1/4. Probability of ee from Ee×Ee = 1/4. Since genes are independent, multiply: 1/4 × 1/4 = 1/16. In 160 offspring that predicts 10 — exactly what we see."
  },
  {
    id:9, title:"Level 10 — Sex-linked traits", type:"sexlinked", advanced:true,
    concept:"Some genes sit on the X chromosome. Males (XY) have only one X — so any recessive X-linked allele is automatically expressed. Females (XX) need two copies of the recessive allele to show the trait, but can be silent carriers.",
    wordProblem:`Glowing eyes in monsters is caused by a <strong>recessive allele g carried on the X chromosome</strong>. Normal eyes use the dominant allele G.<br><br>
A <strong>carrier female</strong> (X<sup>G</sup>X<sup>g</sup>) × <strong>normal-eyed male</strong> (X<sup>G</sup>Y).<br><br>
Use the allele pool below: drag <strong>X<sup>G</sup></strong>, <strong>X<sup>g</sup></strong>, or <strong>Y</strong> into the parent slots to build the cross, then observe the Punnett square offspring.`,
    alleles:["XG","Xg","Y"],
    question:"What is the probability that a SON will have glowing eyes?",
    answer:2, choiceLabels:["0% — sons cannot inherit glowing eyes","25% of all offspring will be glowing sons","50% of all sons will have glowing eyes","100% of all sons will have glowing eyes"],
    expOk:"50% of sons. The cross X\u1d33X\u1d33 or rather X\u1d33X\u1d4d gives sons X\u1d33Y (normal) and X\u1d4dY (glowing) in equal numbers — a 1:1 ratio among sons. Males cannot hide a recessive X-linked allele behind a second X chromosome, so half of all sons will have glowing eyes.",
    expBad:"Look only at the sons: X\u1d33Y (normal eyes) and X\u1d4dY (glowing eyes). That is 1:1 — 50% of sons are affected. Males have only one X chromosome, so any recessive allele on it is automatically expressed."
  }
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let currentLevel = 0;
let scores = new Array(LEVELS.length).fill(null);
let submitted = false;
let draggedAllele = null;
let sandboxOpen = false;
let slots    = { p1a:null, p1b:null, p2a:null, p2b:null };
window._sbSlots = { p1a:null, p1b:null, p2a:null, p2b:null };

// ── SVG MONSTER ───────────────────────────────────────────────────────────────
function monsterSVG(trait, genotype, size) {
  const s = size || 62;
  let bf, bs;
  if (trait==='sex'||trait==='sexlinked') {
    const female = genotype.includes('X') && !genotype.includes('Y') || (genotype.match(/X/g)||[]).length >= 2;
    bf = female ? '#fce7f3' : '#eff6ff';
    bs = female ? '#db2777' : '#2563eb';
  } else if (trait==='incomplete') {
    if (genotype==='PP')      { bf='#ede9fe'; bs='#7c3aed'; }
    else if (genotype==='Pp') { bf='#f5f3ff'; bs='#a78bfa'; }
    else                      { bf='#f3f4f6'; bs='#9ca3af'; }
  } else if (trait==='dihybrid') {
    const hasP = genotype.includes('P'); const hasE = genotype.includes('E');
    bf = hasP ? '#ede9fe' : '#f3f4f6'; bs = hasP ? '#7c3aed' : '#9ca3af';
  } else {
    const hasP = genotype.includes('P'); const hasE = genotype.includes('E');
    if (trait==='fur'||trait==='combo') { bf=hasP?'#ede9fe':'#f3f4f6'; bs=hasP?'#7c3aed':'#9ca3af'; }
    else if (trait==='eyes') { bf=hasE?'#ede9fe':'#f3f4f6'; bs=hasE?'#7c3aed':'#9ca3af'; }
    else { bf='#ede9fe'; bs='#7c3aed'; }
  }
  const numEyes = (trait==='eyes'&&genotype.includes('E'))||(trait==='dihybrid'&&genotype.includes('E')) ? 4 : 2;
  const exs = numEyes===4 ? [s*.26,s*.42,s*.58,s*.74] : [s*.34,s*.66];
  const ey = s*.42;
  const eyes = exs.map(x=>`<circle cx="${x.toFixed(1)}" cy="${ey.toFixed(1)}" r="${(s*.07).toFixed(1)}" fill="#1a1a1a"/><circle cx="${(x+s*.024).toFixed(1)}" cy="${(ey-s*.022).toFixed(1)}" r="${(s*.026).toFixed(1)}" fill="white"/>`).join('');
  const horns=`<polygon points="${(s*.3).toFixed(1)},${(s*.18).toFixed(1)} ${(s*.21).toFixed(1)},${(s*.03).toFixed(1)} ${(s*.39).toFixed(1)},${(s*.18).toFixed(1)}" fill="${bf}" stroke="${bs}" stroke-width="1.5"/><polygon points="${(s*.7).toFixed(1)},${(s*.18).toFixed(1)} ${(s*.61).toFixed(1)},${(s*.03).toFixed(1)} ${(s*.79).toFixed(1)},${(s*.18).toFixed(1)}" fill="${bf}" stroke="${bs}" stroke-width="1.5"/>`;
  const isFemale = (trait==='sex'||trait==='sexlinked') && (genotype.match(/X/g)||[]).length>=2;
  const isMale   = (trait==='sex'||trait==='sexlinked') && genotype.includes('Y');
  const tag = isFemale?`<text x="${(s*.5).toFixed(1)}" y="${(s*.91).toFixed(1)}" text-anchor="middle" font-size="${(s*.15).toFixed(1)}" fill="#db2777">&#9792;</text>`:isMale?`<text x="${(s*.5).toFixed(1)}" y="${(s*.91).toFixed(1)}" text-anchor="middle" font-size="${(s*.15).toFixed(1)}" fill="#2563eb">&#9794;</text>`:'';
  return `<svg width="${s}" height="${s}" viewBox="0 0 ${s} ${s}" xmlns="http://www.w3.org/2000/svg">${horns}<ellipse cx="${(s*.5).toFixed(1)}" cy="${(s*.54).toFixed(1)}" rx="${(s*.36).toFixed(1)}" ry="${(s*.33).toFixed(1)}" fill="${bf}" stroke="${bs}" stroke-width="1.8"/>${eyes}<ellipse cx="${(s*.37).toFixed(1)}" cy="${(s*.63).toFixed(1)}" rx="${(s*.048).toFixed(1)}" ry="${(s*.027).toFixed(1)}" fill="${bs}" opacity=".45"/><ellipse cx="${(s*.63).toFixed(1)}" cy="${(s*.63).toFixed(1)}" rx="${(s*.048).toFixed(1)}" ry="${(s*.027).toFixed(1)}" fill="${bs}" opacity=".45"/><path d="M${(s*.41).toFixed(1)},${(s*.7).toFixed(1)} Q${(s*.5).toFixed(1)},${(s*.77).toFixed(1)} ${(s*.59).toFixed(1)},${(s*.7).toFixed(1)}" stroke="${bs}" stroke-width="1.4" fill="none" stroke-linecap="round"/>${tag}</svg>`;
}

// ── HELPERS ───────────────────────────────────────────────────────────────────
function slotCls(v) {
  if(!v) return '';
  if(v==='Y') return 'f-y';
  if(v==='X'||v==='XG'||v==='Xg') return 'f-x';
  if(v==='PE'||v==='Pe'||v==='pE'||v==='pe') return 'f-gam';
  return v[0]===v[0].toUpperCase() ? 'f-dom' : 'f-rec';
}
function chipCls(sym) {
  if(sym==='Y') return 'sex-y';
  if(sym==='X'||sym==='XG'||sym==='Xg') return 'sex-x';
  if(sym==='PE'||sym==='Pe'||sym==='pE'||sym==='pe') return 'gamete';
  return sym[0]===sym[0].toUpperCase() ? 'dominant' : 'recessive';
}

// Format allele labels with superscripts for X-linked notation
function fmtAllele(sym) {
  if(sym==='XG') return 'X<sup>G</sup>';
  if(sym==='Xg') return 'X<sup>g</sup>';
  return sym;
}

function combosFrom(p1a,p1b,p2a,p2b,trait) {
  if(!p1a||!p1b||!p2a||!p2b) return null;
  return [[p1a,p2a],[p1a,p2b],[p1b,p2a],[p1b,p2b]].map(([a,b])=>{
    if(trait==='sex') return a+b;
    if(trait==='sexlinked') return a+b;
    if(trait==='dihybrid') return a+b;
    const arr=[a,b].sort((x,y)=>(x[0]===x[0].toUpperCase()&&y[0]!==y[0].toUpperCase())?-1:(x[0]!==x[0].toUpperCase()&&y[0]===y[0].toUpperCase())?1:0);
    return arr.join('');
  });
}

function cellCls(trait,g) {
  if(!g) return '';
  if(trait==='incomplete') { if(g==='PP') return 'c-purple'; if(g==='Pp') return 'c-lavender'; if(g==='pp') return 'c-white'; }
  if(trait==='sex'||trait==='sexlinked') return 'c-sex';
  if(trait==='dihybrid') return 'c-dihybrid';
  return 'c-filled';
}

// ── DIHYBRID 4×4 PUNNETT ─────────────────────────────────────────────────────
// Slots for dihybrid: row1,row2,row3,row4 (parent1 gametes) and col1..col4 (parent2 gametes)
window._diSlots = { r1:null,r2:null,r3:null,r4:null, c1:null,c2:null,c3:null,c4:null };

function dihybridCombine(row,col) {
  // e.g. PE + pe → PpEe (sort P before p, E before e)
  const p1 = row[0]; const e1 = row[1];
  const p2 = col[0]; const e2 = col[1];
  const ps = [p1,p2].sort((a,b)=>a===a.toUpperCase()&&b!==b.toUpperCase()?-1:a!==a.toUpperCase()&&b===b.toUpperCase()?1:0).join('');
  const es = [e1,e2].sort((a,b)=>a===a.toUpperCase()&&b!==b.toUpperCase()?-1:a!==a.toUpperCase()&&b===b.toUpperCase()?1:0).join('');
  return ps+es;
}

function renderDihybridPanel(prefix) {
  const d = prefix==='sb4' ? window._diSlots : window._diSlots;
  const rows = [d.r1,d.r2,d.r3,d.r4];
  const cols = [d.c1,d.c2,d.c3,d.c4];
  const alleles = ["PE","Pe","pE","pe"];

  function poolChips() {
    return [...alleles,...alleles].map((sym,i)=>
      `<button class="allele-btn ${chipCls(sym)}" draggable="true"
        data-sym="${sym}" data-prefix="di" data-idx="${i}"
        ondragstart="onDiDragStart(event)" onclick="onDiClick(event)"
        style="font-size:12px">${sym}</button>`
    ).join('');
  }

  function slotHtml(key, val, axis) {
    return `<div class="allele-slot ${val?'f-gam':''}" id="di_${key}"
      ondragover="onDragOver(event)" ondrop="onDiDrop(event,'${key}')" ondragleave="onDragLeave(event)"
      style="min-width:48px;font-size:12px">${val||''}</div>`;
  }

  // Build table
  let tHead = `<tr><th></th><th></th>${cols.map((c,i)=>`<th>${slotHtml('c'+(i+1),c,'col')}</th>`).join('')}</tr>`;
  let tBody = rows.map((r,ri)=>{
    let cells = cols.map((c,ci)=>{
      if(r&&c){ const g=dihybridCombine(r,c); return `<td class="c-dihybrid" style="font-size:10px">${g}</td>`; }
      return `<td style="background:#fafafa;color:#d1d5db">—</td>`;
    }).join('');
    return `<tr><th>${slotHtml('r'+(ri+1),r,'row')}</th><th style="font-size:10px;color:#9ca3af">row ${ri+1}</th>${cells}</tr>`;
  }).join('');

  const p1geno = (d.r1&&d.r2) ? 'PpEe' : null;
  const p2geno = (d.c1&&d.c2) ? 'PpEe' : null;
  const p1svg = p1geno ? monsterSVG('dihybrid','PpEe',52) : `<svg width="52" height="52" viewBox="0 0 52 52"><ellipse cx="26" cy="28" rx="19" ry="17" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><text x="26" y="33" text-anchor="middle" font-size="19" fill="#9ca3af">?</text></svg>`;
  const p2svg = p2geno ? monsterSVG('dihybrid','PpEe',52) : `<svg width="52" height="52" viewBox="0 0 52 52"><ellipse cx="26" cy="28" rx="19" ry="17" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><text x="26" y="33" text-anchor="middle" font-size="19" fill="#9ca3af">?</text></svg>`;

  return `
    <div class="parent-display">
      <div class="parent-card">${p1svg}<div class="plabel">Parent 1</div></div>
      <span class="cross-sym">&times;</span>
      <div class="parent-card">${p2svg}<div class="plabel">Parent 2</div></div>
    </div>
    <div class="picker-section">
      <div class="picker-label">Possible gametes — click or drag into row/column slots</div>
      <div class="picker-row">${poolChips()}</div>
    </div>
    <p style="font-size:12px;color:#888;margin-bottom:8px;font-style:italic">Drag gametes into the row slots (left side = Parent 1) and column slots (top = Parent 2)</p>
    <button class="clear-btn" onclick="clearDiSlots()">Clear</button>
    <div class="punnett-wrap" style="margin-top:10px">
      <div class="section-label">4×4 Punnett square — live</div>
      <table class="punnett-table">
        ${tHead}${tBody}
      </table>
    </div>`;
}

// ── SEX-LINKED PUNNETT ────────────────────────────────────────────────────────
function sexlinkedCombine(a,b) {
  // order: X alleles before Y, XG before Xg
  const order = {'XG':0,'Xg':1,'X':2,'Y':3};
  return [a,b].sort((x,y)=>(order[x]??9)-(order[y]??9)).join('');
}

function fmtGenotype(g) {
  return g.replace(/XG/g,'X<sup>G</sup>').replace(/Xg/g,'X<sup>g</sup>');
}

function renderSexlinkedPanel(prefix, slotsObj) {
  const {p1a,p1b,p2a,p2b} = slotsObj;
  const alleles = ["XG","Xg","Y"];

  function poolChips() {
    // pool: XG, XG, Xg, Xg, Y, Y (two of each so either parent can use them)
    return ["XG","XG","Xg","Xg","Y","Y"].map((sym,i)=>
      `<button class="allele-btn ${chipCls(sym)}" draggable="true"
        data-sym="${sym}" data-parent="any" data-prefix="${prefix}" data-idx="${i}"
        ondragstart="onDragStart(event)" onclick="onAlleleClick(event)"
        style="font-size:12px;min-width:50px">${fmtAllele(sym)}</button>`
    ).join('');
  }

  function slot(id, val) {
    return `<div class="allele-slot ${slotCls(val)}" id="${prefix}_${id}"
      ondragover="onDragOver(event)" ondrop="onDrop(event,'${prefix}','${id}')" ondragleave="onDragLeave(event)"
      style="min-width:52px;font-size:12px">${val ? fmtAllele(val) : ''}</div>`;
  }

  // Build combos
  let combosHtml = '';
  if (p1a&&p1b&&p2a&&p2b) {
    const pairs = [[p1a,p2a],[p1a,p2b],[p1b,p2a],[p1b,p2b]];
    const cells = pairs.map(([a,b])=>sexlinkedCombine(a,b));
    combosHtml = `<div class="punnett-wrap"><div class="section-label">Punnett square — live</div>
      <table class="punnett-table">
        <tr><th></th><th>${fmtAllele(p2a)}</th><th>${fmtAllele(p2b)}</th></tr>
        <tr><th>${fmtAllele(p1a)}</th><td class="c-sex">${fmtGenotype(cells[0])}</td><td class="c-sex">${fmtGenotype(cells[1])}</td></tr>
        <tr><th>${fmtAllele(p1b)}</th><td class="c-sex">${fmtGenotype(cells[2])}</td><td class="c-sex">${fmtGenotype(cells[3])}</td></tr>
      </table></div>`;

    // offspring cards
    const offCards = cells.map(g=>{
      const svg = monsterSVG('sexlinked', g, 48);
      return `<div class="offspring-card">${svg}<span style="font-size:10px">${fmtGenotype(g)}</span></div>`;
    }).join('');
    combosHtml += `<div class="section-label" style="margin-top:12px">Offspring</div><div class="offspring-grid">${offCards}</div>`;
  }

  const p1geno = (p1a&&p1b) ? p1a+p1b : null;
  const p2geno = (p2a&&p2b) ? p2a+p2b : null;
  const p1svg = p1geno ? monsterSVG('sexlinked',p1geno,52) : `<svg width="52" height="52" viewBox="0 0 52 52"><ellipse cx="26" cy="28" rx="19" ry="17" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><text x="26" y="33" text-anchor="middle" font-size="19" fill="#9ca3af">?</text></svg>`;
  const p2svg = p2geno ? monsterSVG('sexlinked',p2geno,52) : `<svg width="52" height="52" viewBox="0 0 52 52"><ellipse cx="26" cy="28" rx="19" ry="17" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><text x="26" y="33" text-anchor="middle" font-size="19" fill="#9ca3af">?</text></svg>`;

  const p1label = p1geno ? fmtGenotype(p1geno) : '??';
  const p2label = p2geno ? fmtGenotype(p2geno) : '??';

  return `
    <div class="parent-display">
      <div class="parent-card">${p1svg}<div class="plabel">${p1label}</div></div>
      <span class="cross-sym">&times;</span>
      <div class="parent-card">${p2svg}<div class="plabel">${p2label}</div></div>
    </div>
    <div class="picker-section">
      <div class="picker-label">Possible alleles — click or drag into any parent slot</div>
      <div class="picker-row">${poolChips()}</div>
    </div>
    <div class="slot-row">
      <span class="slot-label">Parent 1</span>
      ${slot('p1a',p1a)}${slot('p1b',p1b)}
    </div>
    <div class="slot-row">
      <span class="slot-label">Parent 2</span>
      ${slot('p2a',p2a)}${slot('p2b',p2b)}
    </div>
    <button class="clear-btn" onclick="clearSlots('${prefix}')">Clear</button>
    ${combosHtml}`;
}

// ── STANDARD PUNNETT PANEL ────────────────────────────────────────────────────
function renderPunnettPanel(lv, prefix, slotsObj) {
  const {p1a,p1b,p2a,p2b} = slotsObj;
  const alleles = lv.alleles;
  const trait   = lv.trait;

  function allelePool() {
    return [...alleles,...alleles].map((sym,i)=>
      `<button class="allele-btn ${chipCls(sym)} draggable" draggable="true"
        data-sym="${sym}" data-parent="any" data-prefix="${prefix}" data-idx="${i}"
        ondragstart="onDragStart(event)" onclick="onAlleleClick(event)"
        title="Click or drag ${sym} into any slot">${sym}</button>`
    ).join('');
  }

  const combos = combosFrom(p1a,p1b,p2a,p2b,trait);
  const cells  = combos || [null,null,null,null];

  let offspringHtml = '';
  if (combos) {
    const cards = combos.map(g=>{
      const t = trait==='incomplete'?'incomplete':trait;
      return `<div class="offspring-card">${monsterSVG(t,g,48)}<span>${g}</span></div>`;
    }).join('');
    offspringHtml = `<div class="section-label" style="margin-top:12px">Offspring</div><div class="offspring-grid">${cards}</div>`;
  }

  const p1geno = (p1a&&p1b) ? p1a+p1b : null;
  const p2geno = (p2a&&p2b) ? p2a+p2b : null;
  const ph = `<svg width="52" height="52" viewBox="0 0 52 52"><ellipse cx="26" cy="28" rx="19" ry="17" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/><text x="26" y="33" text-anchor="middle" font-size="19" fill="#9ca3af">?</text></svg>`;
  const p1svg = p1geno ? monsterSVG(trait,p1geno,52) : ph;
  const p2svg = p2geno ? monsterSVG(trait,p2geno,52) : ph;

  return `
    <div class="parent-display">
      <div class="parent-card">${p1svg}<div class="plabel">Parent 1 (${p1a||'?'}${p1b||'?'})</div></div>
      <span class="cross-sym">&times;</span>
      <div class="parent-card">${p2svg}<div class="plabel">Parent 2 (${p2a||'?'}${p2b||'?'})</div></div>
    </div>
    <div class="picker-section">
      <div class="picker-label">Possible alleles — click or drag into any parent slot</div>
      <div class="picker-row">${allelePool()}</div>
    </div>
    <div class="slot-row">
      <span class="slot-label">Parent 1</span>
      <div class="allele-slot ${slotCls(p1a)}" id="${prefix}_p1a" ondragover="onDragOver(event)" ondrop="onDrop(event,'${prefix}','p1a')" ondragleave="onDragLeave(event)">${p1a||''}</div>
      <div class="allele-slot ${slotCls(p1b)}" id="${prefix}_p1b" ondragover="onDragOver(event)" ondrop="onDrop(event,'${prefix}','p1b')" ondragleave="onDragLeave(event)">${p1b||''}</div>
    </div>
    <div class="slot-row">
      <span class="slot-label">Parent 2</span>
      <div class="allele-slot ${slotCls(p2a)}" id="${prefix}_p2a" ondragover="onDragOver(event)" ondrop="onDrop(event,'${prefix}','p2a')" ondragleave="onDragLeave(event)">${p2a||''}</div>
      <div class="allele-slot ${slotCls(p2b)}" id="${prefix}_p2b" ondragover="onDragOver(event)" ondrop="onDrop(event,'${prefix}','p2b')" ondragleave="onDragLeave(event)">${p2b||''}</div>
    </div>
    <button class="clear-btn" onclick="clearSlots('${prefix}')">Clear</button>
    <div class="punnett-wrap">
      <div class="section-label">Punnett square — live</div>
      <table class="punnett-table">
        <tr><th></th><th>${p2a||'?'}</th><th>${p2b||'?'}</th></tr>
        <tr><th>${p1a||'?'}</th><td class="${cellCls(trait,cells[0])}">${cells[0]||''}</td><td class="${cellCls(trait,cells[1])}">${cells[1]||''}</td></tr>
        <tr><th>${p1b||'?'}</th><td class="${cellCls(trait,cells[2])}">${cells[2]||''}</td><td class="${cellCls(trait,cells[3])}">${cells[3]||''}</td></tr>
      </table>
    </div>
    ${offspringHtml}`;
}

// ── LEGEND HTML ───────────────────────────────────────────────────────────────
function legendFor(lv) {
  if(lv.trait==='fur'||lv.trait==='combo') return `<div class="legend-item"><div class="legend-dot" style="background:#ede9fe;border-color:#7c3aed"></div>P — Purple fur (dominant)</div><div class="legend-item"><div class="legend-dot" style="background:#f3f4f6;border-color:#9ca3af"></div>p — White fur (recessive)</div>`;
  if(lv.trait==='eyes') return `<div class="legend-item"><div class="legend-dot" style="background:#ede9fe;border-color:#7c3aed"></div>E — Four eyes (dominant)</div><div class="legend-item"><div class="legend-dot" style="background:#f3f4f6;border-color:#9ca3af"></div>e — Two eyes (recessive)</div>`;
  if(lv.trait==='sex') return `<div class="legend-item"><div class="legend-dot" style="background:#fce7f3;border-color:#db2777"></div>X chromosome</div><div class="legend-item"><div class="legend-dot" style="background:#eff6ff;border-color:#2563eb"></div>Y chromosome</div>`;
  if(lv.trait==='incomplete') return `<div class="legend-item"><div class="legend-dot" style="background:#ede9fe;border-color:#7c3aed"></div>PP — Purple</div><div class="legend-item"><div class="legend-dot" style="background:#f5f3ff;border-color:#a78bfa"></div>Pp — Lavender</div><div class="legend-item"><div class="legend-dot" style="background:#f3f4f6;border-color:#9ca3af"></div>pp — White</div>`;
  if(lv.type==='dihybrid') return `<div class="legend-item"><div class="legend-dot" style="background:#ede9fe;border-color:#7c3aed"></div>P/p — fur colour</div><div class="legend-item"><div class="legend-dot" style="background:#ede9fe;border-color:#7c3aed"></div>E/e — eye count</div><div class="legend-item"><div class="legend-dot" style="background:#e0f2fe;border-color:#0284c7"></div>Gamete combos</div>`;
  if(lv.type==='sexlinked') return `<div class="legend-item"><div class="legend-dot" style="background:#fce7f3;border-color:#db2777"></div>X<sup>G</sup> — normal eyes</div><div class="legend-item"><div class="legend-dot" style="background:#fce7f3;border-color:#db2777"></div>X<sup>g</sup> — glowing (recessive)</div><div class="legend-item"><div class="legend-dot" style="background:#eff6ff;border-color:#2563eb"></div>Y</div>`;
  return '';
}

// ── RENDER LEVEL ──────────────────────────────────────────────────────────────
function renderLevel(idx) {
  const lv = LEVELS[idx];
  const adv = !!lv.advanced;

  function questionBlock(show) {
    if(!show && lv.type!=='word'&&lv.type!=='dihybrid'&&lv.type!=='sexlinked' && !(slots.p1a&&slots.p1b&&slots.p2a&&slots.p2b)) return '';
    if(submitted) {
      const sel = parseInt(document.getElementById('answerSel')?.value??'-1');
      const ok = sel===lv.answer;
      return `<div class="question-wrap"><div class="question-text">${lv.question}</div>
        <select class="answer-select" id="answerSel" disabled>
          <option value="-1">— choose an answer —</option>
          ${lv.choiceLabels.map((l,i)=>`<option value="${i}" ${i===sel?'selected':''}>${l}</option>`).join('')}
        </select>
        <div class="feedback ${ok?'ok':'bad'}">
          <h4>${ok?'&#10003; Correct!':'&#10007; Not quite'}<span class="score-badge ${ok?'ok':'bad'}">${ok?'+10 pts':'0 pts'}</span></h4>
          <p>${ok?lv.expOk:lv.expBad}</p>
        </div>
        <div style="margin-top:10px"><button class="btn-submit ${adv?'adv-btn':''}" onclick="nextLevel()">Next level &rarr;</button></div>
      </div>`;
    }
    return `<div class="question-wrap"><div class="question-text">${lv.question}</div>
      <select class="answer-select" id="answerSel">
        <option value="-1">— choose an answer —</option>
        ${lv.choiceLabels.map((l,i)=>`<option value="${i}">${l}</option>`).join('')}
      </select>
      <button class="btn-submit ${adv?'adv-btn':''}" onclick="submitAnswer()">Submit answer</button>
    </div>`;
  }

  // DIHYBRID level
  if(lv.type==='dihybrid') {
    return `<div class="game-area" style="grid-template-columns:1fr">
      <div class="panel full">
        <div class="concept-box adv-concept">${lv.concept}</div>
        <div class="word-problem-box"><div class="wp-title">Word problem</div>${lv.wordProblem}</div>
        <div class="legend" style="margin-bottom:12px">${legendFor(lv)}</div>
        ${renderDihybridPanel('di')}
        ${questionBlock(true)}
      </div></div>`;
  }

  // SEX-LINKED level
  if(lv.type==='sexlinked') {
    return `<div class="game-area" style="grid-template-columns:1fr">
      <div class="panel full">
        <div class="concept-box adv-concept">${lv.concept}</div>
        <div class="word-problem-box"><div class="wp-title">Word problem</div>${lv.wordProblem}</div>
        <div class="legend" style="margin-bottom:12px">${legendFor(lv)}</div>
        ${renderSexlinkedPanel('sl', slots)}
        ${questionBlock(true)}
      </div></div>`;
  }

  // WORD PROBLEM level (with sandbox)
  if(lv.type==='word') {
    const sbOpen = sandboxOpen;
    const sbIcon = sbOpen
      ? `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6l4 4 4-4"/></svg>`
      : `<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 10l4-4 4 4"/></svg>`;
    const sbContent = sbOpen ? `<div class="sandbox-section">
      <div class="section-label">Punnett square sandbox</div>
      <div class="legend" style="margin-bottom:10px">${legendFor(lv)}</div>
      ${renderPunnettPanel(lv,'sb',window._sbSlots||{p1a:null,p1b:null,p2a:null,p2b:null})}
    </div>` : '';
    return `<div class="game-area" style="grid-template-columns:1fr">
      <div class="panel full">
        <div class="concept-box adv-concept">${lv.concept}</div>
        <div class="word-problem-box"><div class="wp-title">Word problem</div>${lv.wordProblem}</div>
        <div class="sandbox-toggle" onclick="toggleSandbox()">${sbIcon} ${sbOpen?'Hide':'Open'} Punnett square sandbox</div>
        ${sbContent}
        ${questionBlock(true)}
      </div></div>`;
  }

  // STANDARD PUNNETT level
  return `<div class="game-area">
    <div class="panel full">
      <div class="concept-box ${adv?'adv-concept':''}">${lv.concept}</div>
      <p class="hint-text">${lv.hint}</p>
    </div>
    <div class="panel">
      <h3>Parents &amp; allele picker</h3>
      <div class="legend">${legendFor(lv)}</div>
      ${renderPunnettPanel(lv,'main',slots)}
    </div>
    <div class="panel">
      <h3>Question</h3>
      <p style="font-size:13px;color:#666;margin-bottom:12px;line-height:1.6">Use the Punnett square to help you answer. You can try any combination of alleles freely.</p>
      ${questionBlock(true)}
    </div>
  </div>`;
}

// ── LEVEL BAR ─────────────────────────────────────────────────────────────────
function renderLevelBar() {
  document.getElementById('levelBar').innerHTML = LEVELS.map((lv,i)=>{
    const done=scores[i]!==null, active=i===currentLevel;
    return `<button class="level-btn ${active?'active':''} ${done&&!active?'done':''} ${lv.advanced?'adv':''}" onclick="goLevel(${i})">L${i+1}${lv.advanced?'*':''}</button>`;
  }).join('');
  const pct=(scores.filter(s=>s!==null).length/LEVELS.length*100).toFixed(0);
  document.getElementById('progressBar').style.width=pct+'%';
}

function render() {
  const lv=LEVELS[currentLevel];
  document.getElementById('main').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:1rem;flex-wrap:wrap">
      <h2 style="font-size:16px;font-weight:600">${lv.title}${lv.advanced?'<span class="badge-adv">Advanced</span>':''}</h2>
    </div>
    ${renderLevel(currentLevel)}`;
  renderLevelBar();
}

// ── INTERACTION ───────────────────────────────────────────────────────────────
function getSlots(prefix) { return prefix==='sb'?window._sbSlots:prefix==='sl'?slots:slots; }

function onAlleleClick(e) {
  const sym=e.currentTarget.dataset.sym, prefix=e.currentTarget.dataset.prefix;
  const s=getSlots(prefix);
  if(!s.p1a) s.p1a=sym; else if(!s.p1b) s.p1b=sym; else if(!s.p2a) s.p2a=sym; else if(!s.p2b) s.p2b=sym;
  render();
}

function onDragStart(e) {
  draggedAllele={sym:e.currentTarget.dataset.sym, prefix:e.currentTarget.dataset.prefix};
  e.dataTransfer.effectAllowed='copy';
}
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
function onDrop(e,prefix,slotId) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!draggedAllele) return;
  getSlots(prefix)[slotId]=draggedAllele.sym;
  render(); draggedAllele=null;
}
function clearSlots(prefix) {
  const s=getSlots(prefix); s.p1a=null;s.p1b=null;s.p2a=null;s.p2b=null;
  if(prefix==='main'||prefix==='sl') submitted=false;
  render();
}

// Dihybrid drag/click
let diDragged = null;
function onDiDragStart(e) {
  diDragged={sym:e.currentTarget.dataset.sym};
  e.dataTransfer.effectAllowed='copy';
}
function onDiClick(e) {
  const sym=e.currentTarget.dataset.sym;
  const d=window._diSlots;
  if(!d.r1) d.r1=sym; else if(!d.r2) d.r2=sym; else if(!d.r3) d.r3=sym;
  else if(!d.r4) d.r4=sym; else if(!d.c1) d.c1=sym; else if(!d.c2) d.c2=sym;
  else if(!d.c3) d.c3=sym; else if(!d.c4) d.c4=sym;
  render();
}
function onDiDrop(e, key) {
  e.preventDefault(); e.currentTarget.classList.remove('drag-over');
  if(!diDragged) return;
  window._diSlots[key]=diDragged.sym;
  render(); diDragged=null;
}
function clearDiSlots() {
  window._diSlots={r1:null,r2:null,r3:null,r4:null,c1:null,c2:null,c3:null,c4:null};
  render();
}

function toggleSandbox() { sandboxOpen=!sandboxOpen; render(); }

function submitAnswer() {
  const sel=parseInt(document.getElementById('answerSel').value);
  if(sel===-1){alert('Please choose an answer first.');return;}
  scores[currentLevel]=sel===LEVELS[currentLevel].answer?10:0;
  submitted=true; render();
}

function nextLevel() {
  if(currentLevel<LEVELS.length-1) {
    currentLevel++; slots={p1a:null,p1b:null,p2a:null,p2b:null};
    window._sbSlots={p1a:null,p1b:null,p2a:null,p2b:null};
    window._diSlots={r1:null,r2:null,r3:null,r4:null,c1:null,c2:null,c3:null,c4:null};
    submitted=false; sandboxOpen=false; render();
  } else { showFinish(); }
}

function goLevel(i) {
  currentLevel=i; slots={p1a:null,p1b:null,p2a:null,p2b:null};
  window._sbSlots={p1a:null,p1b:null,p2a:null,p2b:null};
  window._diSlots={r1:null,r2:null,r3:null,r4:null,c1:null,c2:null,c3:null,c4:null};
  submitted=false; sandboxOpen=false; render();
}

function restartGame() {
  currentLevel=0; scores=new Array(LEVELS.length).fill(null);
  slots={p1a:null,p1b:null,p2a:null,p2b:null};
  window._sbSlots={p1a:null,p1b:null,p2a:null,p2b:null};
  window._diSlots={r1:null,r2:null,r3:null,r4:null,c1:null,c2:null,c3:null,c4:null};
  submitted=false; sandboxOpen=false; render();
}

function showFinish() {
  const total=scores.reduce((a,b)=>(a||0)+(b||0),0);
  const msg=total===100?'Perfect score — exceptional genetics scientist!':total>=70?'Outstanding work! Strong grasp of genetics.':total>=50?'Good effort! Review advanced levels to improve.':'Keep practising — genetics takes time to master!';
  const allMon=[['fur','PP'],['fur','Pp'],['fur','pp'],['incomplete','Pp'],['eyes','Ee'],['sex','XX'],['sex','XY']].map(([t,g])=>monsterSVG(t,g,42)).join('');
  document.getElementById('main').innerHTML=`<div class="panel finish-panel">
    <div style="display:flex;justify-content:center;gap:7px;flex-wrap:wrap;margin-bottom:18px">${allMon}</div>
    <h2>Lab complete!</h2>
    <p>You scored <span class="score-total">${total}/100</span> across all 10 levels.</p>
    <p style="font-size:13px;color:#888;margin-bottom:20px">${msg}</p>
    <div style="background:#faf9ff;border:1px solid #e0ddd6;border-radius:10px;padding:14px;text-align:left;margin-bottom:22px;max-width:460px;margin-left:auto;margin-right:auto">
      <div style="font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#9ca3af;margin-bottom:8px">Score breakdown</div>
      ${LEVELS.map((lv,i)=>`<div class="summary-row"><span style="color:#555;font-size:13px">${lv.title.replace(/Level \d+ — /,'')}</span><span style="font-weight:700;color:${scores[i]===10?'#15803d':'#b91c1c'}">${scores[i]===10?'10':'0'}/10</span></div>`).join('')}
    </div>
    <button class="btn-submit" onclick="restartGame()">Start over</button>
  </div>`;
  renderLevelBar();
}

render();
</script>
</body>
</html>
