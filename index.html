<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CurioMinds.inc — Science Simulations</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Nunito+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0D1B3E;
      --navy:    #1B2F5E;
      --red:     #D94F6B;
      --navy-lt: #2B4A8A;
      --purple:  #6B3FA0;
      --white:   #FFFFFF;
      --cream:   #F0EDE8;
      --card:    #1A2B52;
      --gold:    #F5C842;
      --card-shadow: 0 4px 18px rgba(0,0,0,0.30);
      --card-shadow-hover: 0 10px 32px rgba(0,0,0,0.50);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'Nunito Sans', sans-serif;
      background: var(--bg);
      color: var(--white);
      min-height: 100vh;
    }

    /* ── NAV ── */
    nav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--navy);
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      height: 54px;
      box-shadow: 0 2px 12px rgba(27,47,94,0.25);
    }

    nav .nav-logo {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.05rem;
      color: var(--white);
      letter-spacing: 0.04em;
      white-space: nowrap;
      margin-right: auto;
      text-decoration: none;
    }

    nav .nav-logo span { color: var(--red); }

    nav a {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.75);
      text-decoration: none;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      transition: color 0.2s;
      white-space: nowrap;
    }

    nav a:hover { color: var(--red); }
    nav a.active { color: var(--red); }

    /* ── HERO ── */
    header {
      background: var(--navy);
      padding: 3.5rem 2rem 3rem;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    header::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 60% 40%, rgba(217,79,107,0.18) 0%, transparent 65%),
                  radial-gradient(ellipse at 20% 70%, rgba(43,74,138,0.35) 0%, transparent 60%);
      pointer-events: none;
    }

    /* stars */
    header::after {
      content: '✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦ ✧ ✦';
      position: absolute;
      top: 1.2rem;
      left: 0; right: 0;
      text-align: center;
      font-size: 0.6rem;
      color: rgba(255,255,255,0.12);
      letter-spacing: 0.8rem;
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      display: inline-flex;
      align-items: center;
      gap: 1.5rem;
    }

    .hero-text { text-align: left; }

    .logo-wrap {
      display: inline-block;
      flex-shrink: 0;
    }

    .logo-wrap img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 50px rgba(217,79,107,0.35);
      display: block;
    }


    header h1 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      color: var(--white);
      letter-spacing: 0.03em;
      line-height: 1.1;
    }

    header h1 span { color: var(--red); }

    header p.tagline {
      margin-top: 0.6rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.55);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    header p.sub {
      margin-top: 1rem;
      font-size: 1rem;
      color: rgba(255,255,255,0.7);
      line-height: 1.6;
    }

    /* ── MAIN ── */
    main {
      max-width: 1100px;
      margin: 0 auto;
      padding: 3rem 1.5rem 5rem;
    }

    /* ── CATEGORY SECTION ── */
    .category { margin-bottom: 3.5rem; }

    .category-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }

    .cat-icon {
      width: 36px;
      height: 36px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .category-header h2 {
      font-family: 'Nunito', sans-serif;
      font-weight: 900;
      font-size: 1.25rem;
      color: var(--white);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .category-header h2 span {
      display: inline-block;
      width: 32px;
      height: 3px;
      background: var(--red);
      border-radius: 2px;
      vertical-align: middle;
      margin-left: 0.6rem;
      margin-bottom: 3px;
    }

    .divider {
      height: 2px;
      background: linear-gradient(to right, var(--red) 0%, rgba(217,79,107,0.1) 60%, transparent 100%);
      border-radius: 2px;
      margin-bottom: 1.25rem;
    }

    /* ── GRID ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1.5rem;
    }

    /* ── CARD ── */
    .card {
      background: var(--card);
      border-radius: 16px;
      padding: 1.8rem 1.8rem 1.6rem;
      box-shadow: var(--card-shadow);
      border: 1.5px solid rgba(255,255,255,0.08);
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      transition: transform 0.22s ease, box-shadow 0.22s ease, border-color 0.22s ease;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: var(--red);
      border-radius: 14px 0 0 14px;
      opacity: 0;
      transition: opacity 0.22s;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--card-shadow-hover);
      border-color: rgba(217,79,107,0.3);
    }

    .card:hover::before { opacity: 1; }

    .card-title {
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 1.1rem;
      color: var(--white);
      line-height: 1.3;
    }

    .card-desc {
      font-size: 0.88rem;
      color: rgba(255,255,255,0.60);
      line-height: 1.55;
      flex: 1;
    }

    .card-link {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      color: var(--red);
      letter-spacing: 0.06em;
      text-transform: uppercase;
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.3rem;
    }

    .card-link::after { content: '→'; transition: transform 0.2s; }
    .card:hover .card-link::after { transform: translateX(4px); }

    /* ── COMING SOON CARD ── */
    .card.coming-soon {
      opacity: 0.6;
      cursor: default;
      pointer-events: none;
    }
    .card.coming-soon::before { display: none; }
    .coming-soon-badge {
      display: inline-block;
      font-family: 'Nunito', sans-serif;
      font-weight: 800;
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      background: rgba(255,255,255,0.10);
      color: rgba(255,255,255,0.70);
      border: 1.5px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 0.2rem 0.65rem;
      margin-top: 0.3rem;
      align-self: flex-start;
    }

    /* ── FILTER BAR ── */
    .filter-bar {
      position: sticky;
      top: 54px;
      z-index: 90;
      background: var(--card);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      box-shadow: 0 2px 8px rgba(0,0,0,0.20);
      padding: 0 2rem;
    }
    .filter-row {
      max-width: 1100px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.55rem 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .filter-row::-webkit-scrollbar { display: none; }
    .filter-btn {
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.04em;
      padding: 0.35rem 0.9rem;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.20);
      background: transparent;
      color: rgba(255,255,255,0.85);
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--red); color: var(--red); }
    .filter-btn.active { background: var(--red); border-color: var(--red); color: var(--white); }

    /* ── FOOTER ── */
    footer {
      background: var(--navy);
      text-align: center;
      padding: 2rem;
      font-family: 'Nunito', sans-serif;
      font-weight: 700;
      font-size: 0.82rem;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    footer span { color: var(--red); }

    /* ── RESPONSIVE ── */
    @media (max-width: 600px) {
      nav a:not(.nav-logo) { font-size: 0.72rem; }
      .cards-grid { grid-template-columns: 1fr; }
      .hero-inner { flex-direction: column; text-align: center; }
      .hero-text { text-align: center; }
    }

    /* ── FADE IN ANIMATION ── */
    .category {
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 0.55s ease forwards;
    }
    .category:nth-child(1) { animation-delay: 0.05s; }
    .category:nth-child(2) { animation-delay: 0.15s; }
    .category:nth-child(3) { animation-delay: 0.25s; }
    .category:nth-child(4) { animation-delay: 0.35s; }
    .category:nth-child(5) { animation-delay: 0.45s; }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

const SIMS = [

  { cat:'physics', href:'Physics/light-reflection-simulation.html', title:'Reflection of Light', desc:'Explore how light bounces off surfaces. Adjust angles and mirror types to see the law of reflection in action.' },
  { cat:'physics', href:'Physics/ray_diagram_simulator.html', title:'Ray Diagram Simulator', desc:'Observe how light rays behave around plane mirrors, construct ray diagrams step by step, and test your understanding through guided challenges and practice.' },
  { cat:'physics', href:'Physics/brownian_motion.html', title:'Brownian Motion', desc:'Watch tiny particles collide randomly with invisible molecules — a window into the kinetic theory of matter.' },
  { cat:'physics', href:'Physics/heat-conduction-simulator.html', title:'Heat Conduction', desc:'Apply heat to different materials and see how thermal energy travels through solids at different rates.' },
  { cat:'physics', href:'Physics/catapult_simulator.html', title:'Catapult & Projectile Motion', desc:'Adjust launch angle and speed to fire a catapult at a distant castle — discover how the range formula governs every shot through open-ended experimentation.' },
  // ── Chemistry ──
  { cat:'chemistry', href:'Chemistry/buildformula.html', title:'Chemical Compound Builder', desc:'Experiment with atoms and ions as they combine in fixed ratios — uncover the patterns behind chemical compounds through hands-on discovery.' },
  { cat:'chemistry', href:'Chemistry/chem-balancer-v2.html', title:'Chemical Equation Balancer', desc:'Visualise atom counts on both sides of a reaction and learn to balance chemical equations by adjusting coefficients in real time.' },
  { cat:'chemistry', href:'Chemistry/particle_simulator.html', title:'States of Matter — Particle Simulator', desc:'Watch particles rearrange as a substance gains or loses heat, and observe the changes of state from solid to liquid to gas at the molecular level.' },
  // ── Biology ──
  { cat:'biology', href:'Biology/monster_genetics_lab_v4.html', title:'Inheritance Monster Lab', desc:'Mix monster genes and discover how traits are inherited. A fun, hands-on look at dominant and recessive alleles.' },
  { cat:'biology', href:'Biology/maltase-simulation.html', title:'Enzymes — Lock and Key Hypothesis', desc:'See how enzymes bind to specific substrates and explore how temperature and pH affect enzyme activity.' },
  { cat:'biology', href:'Biology/bioflow_final.html', title:'Transport in Plants', desc:'Follow water and nutrients as they move through xylem and phloem from roots to leaves.' },
  { cat:'biology', href:'Biology/osmosis-simulation.html', title:'Osmosis Lab', desc:'Place cells in solutions of different concentrations and observe how water moves across semi-permeable membranes.' },
  { cat:'biology', href:'https://coral-reef-explorer.base44.app/', title:'Coral Reef Explorer', desc:'Explore a living 3D coral reef ecosystem, investigate the roles of its organisms, and observe how changes can affect the balance of the ecosystem.' },
  { cat:'biology', href:'Biology/heart_detective_v5.html', title:'Cardiac Cycle', desc:'Explore the cardiac cycle by linking each point on the pressure–time graph to the corresponding events occurring in the heart.' },

  { cat:'earth-science', title:'The Water Cycle', desc:'Trace a water molecule through evaporation, condensation, and precipitation across a live landscape.', status:'coming-soon' },
  { cat:'earth-science', title:'Rock & Mineral Identifier', desc:'Explore igneous, sedimentary, and metamorphic rocks — learn how each type forms under different conditions.', status:'coming-soon' },

function renderSims() {
  ['physics','chemistry','biology','earth-science','astronomy'].forEach(cat => {
    const grid = document.getElementById('grid-' + cat);
    if (!grid) return;
    grid.innerHTML = SIMS.filter(s => s.cat === cat).map(s => {
      if (s.status === 'coming-soon') {
        return `<div class="card coming-soon">
          <div class="card-title">${s.title}</div>
          <div class="card-desc">${s.desc}</div>
          <div class="coming-soon-badge">Coming Soon</div>
        </div>`;
      }
      return `<a class="card" href="${s.href}" target="_blank" rel="noopener">
        <div class="card-title">${s.title}</div>
        <div class="card-desc">${s.desc}</div>
        <div class="card-link">Launch simulation</div>
      </a>`;
    }).join('');
  });
}

renderSims();

document.querySelectorAll('.filter-btn[data-cat]').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn[data-cat]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const cat = btn.dataset.cat;
    ['physics','chemistry','biology','earth-science','astronomy'].forEach(id => {
      const section = document.getElementById(id);
      if (section) section.style.display = (cat === 'all' || cat === id) ? '' : 'none';
    });
  });
});
