<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic Particle Theory Simulator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Urbanist:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0a0e27;
            --bg-medium: #151b3d;
            --bg-light: #1e2749;
            --accent-blue: #00d4ff;
            --accent-purple: #9d4edd;
            --accent-orange: #ff6b35;
            --text-primary: #e8ecf3;
            --text-secondary: #a5adc8;
            --solid-color: #4cc9f0;
            --liquid-color: #4895ef;
            --gas-color: #f72585;
            --particle-base: #ffffff;
            --bond-color: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Urbanist', sans-serif;
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--bg-medium) 100%);
            color: var(--text-primary);
            overflow-x: hidden;
            min-height: 100vh;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        h1 {
            font-family: 'Urbanist', sans-serif;
            font-weight: 700;
            font-size: 2.5rem;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .credits {
            margin-top: 15px;
            font-family: 'Urbanist', sans-serif;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .credits a {
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.3s;
            font-weight: 500;
        }

        .credits a:hover {
            color: var(--accent-purple);
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 20px;
            margin-bottom: 20px;
        }

        .simulation-panel {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        .simulation-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple), var(--accent-orange));
        }

        #canvas-container {
            position: relative;
            width: 100%;
            aspect-ratio: 4/3;
            background: rgba(10, 14, 39, 0.6);
            border-radius: 12px;
            overflow: hidden;
            cursor: grab;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        #canvas-container:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .graph-panel {
            background: var(--bg-light);
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .graph-panel::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-orange), var(--accent-purple), var(--accent-blue));
        }

        .panel-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            color: var(--accent-blue);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            margin-bottom: 15px;
            font-weight: 600;
        }

        #heating-curve-canvas {
            width: 100%;
            height: 350px;
            background: rgba(10, 14, 39, 0.4);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .controls-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .control-group {
            background: var(--bg-light);
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .control-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .control-value {
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 0.9rem;
        }

        input[type="range"] {
            width: 100%;
            height: 8px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.1);
            outline: none;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            cursor: pointer;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
            transition: transform 0.2s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            cursor: pointer;
            border: none;
            box-shadow: 0 0 10px rgba(0, 212, 255, 0.5);
        }

        .button-group {
            display: flex;
            gap: 10px;
        }

        button {
            flex: 1;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple));
            color: white;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 212, 255, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .info-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
        }

        .info-card {
            background: rgba(10, 14, 39, 0.6);
            border-radius: 10px;
            padding: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-card-title {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .info-card-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-blue);
        }

        .state-indicator {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .state-solid {
            background: rgba(76, 201, 240, 0.2);
            color: var(--solid-color);
            border: 1px solid var(--solid-color);
        }

        .state-liquid {
            background: rgba(72, 149, 239, 0.2);
            color: var(--liquid-color);
            border: 1px solid var(--liquid-color);
        }

        .state-gas {
            background: rgba(247, 37, 133, 0.2);
            color: var(--gas-color);
            border: 1px solid var(--gas-color);
        }

        .state-melting {
            background: rgba(157, 78, 221, 0.2);
            color: var(--accent-purple);
            border: 1px solid var(--accent-purple);
        }

        .state-boiling {
            background: rgba(255, 107, 53, 0.2);
            color: var(--accent-orange);
            border: 1px solid var(--accent-orange);
        }

        .phase-message {
            margin-top: 15px;
            padding: 15px;
            background: rgba(157, 78, 221, 0.1);
            border-left: 3px solid var(--accent-purple);
            border-radius: 8px;
            font-size: 0.9rem;
            line-height: 1.6;
            display: none;
        }

        .phase-message.active {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .heating-indicator, .cooling-indicator {
            position: absolute;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .heating-indicator {
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
        }

        .heating-indicator.active {
            opacity: 1;
        }

        .cooling-indicator {
            top: 50%;
            left: -30px;
            right: -30px;
            transform: translateY(-50%);
        }

        .cooling-indicator.active {
            opacity: 1;
        }

        @media (max-width: 1200px) {
            .main-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .controls-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Kinetic Particle Theory Simulator</h1>
            <div class="subtitle">Interactive Phase Transitions</div>
            <div class="credits">
                Created by: Mr Lau Chin Hang | 
                <a href="https://www.instagram.com/curiominds.inc" target="_blank" rel="noopener noreferrer">@curiominds.inc</a>
            </div>
        </header>

        <div class="main-grid">
            <div class="simulation-panel">
                <div class="panel-title">Particle Simulation</div>
                <div id="canvas-container">
                    <canvas id="particle-canvas"></canvas>
                    <div class="heating-indicator" id="heating-indicator">
                        <svg width="60" height="80" viewBox="0 0 60 80">
                            <defs>
                                <linearGradient id="flameGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                                    <stop offset="0%" style="stop-color:#ff6b35;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#ffa500;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#ffeb3b;stop-opacity:0.5" />
                                </linearGradient>
                            </defs>
                            <ellipse cx="30" cy="75" rx="25" ry="5" fill="#333"/>
                            <path d="M 30 70 Q 20 50 25 30 Q 30 10 30 5 Q 30 10 35 30 Q 40 50 30 70 Z" 
                                  fill="url(#flameGrad)" opacity="0.9">
                                <animate attributeName="d" 
                                         values="M 30 70 Q 20 50 25 30 Q 30 10 30 5 Q 30 10 35 30 Q 40 50 30 70 Z;
                                                 M 30 70 Q 22 50 27 30 Q 32 10 30 3 Q 28 10 33 30 Q 38 50 30 70 Z;
                                                 M 30 70 Q 20 50 25 30 Q 30 10 30 5 Q 30 10 35 30 Q 40 50 30 70 Z"
                                         dur="0.3s" repeatCount="indefinite"/>
                            </path>
                        </svg>
                    </div>
                    <div class="cooling-indicator" id="cooling-indicator">
                        <svg width="100%" height="40" viewBox="0 0 300 40">
                            <defs>
                                <linearGradient id="iceGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                                    <stop offset="0%" style="stop-color:#4cc9f0;stop-opacity:0.3" />
                                    <stop offset="50%" style="stop-color:#80ffff;stop-opacity:0.6" />
                                    <stop offset="100%" style="stop-color:#4cc9f0;stop-opacity:0.3" />
                                </linearGradient>
                            </defs>
                            <rect x="10" y="5" width="30" height="30" fill="url(#iceGrad)" stroke="#4cc9f0" stroke-width="2" opacity="0.7"/>
                            <rect x="50" y="8" width="25" height="25" fill="url(#iceGrad)" stroke="#4cc9f0" stroke-width="2" opacity="0.6"/>
                            <rect x="260" y="5" width="30" height="30" fill="url(#iceGrad)" stroke="#4cc9f0" stroke-width="2" opacity="0.7"/>
                            <rect x="225" y="8" width="25" height="25" fill="url(#iceGrad)" stroke="#4cc9f0" stroke-width="2" opacity="0.6"/>
                        </svg>
                    </div>
                </div>
            </div>

            <div class="graph-panel">
                <div class="panel-title">Heating Curve</div>
                <canvas id="heating-curve-canvas"></canvas>
                
                <div class="info-panel" style="margin-top: 20px;">
                    <div class="info-card">
                        <div class="info-card-title">State</div>
                        <div class="info-card-value" id="state-display">
                            <span class="state-indicator state-solid">Solid</span>
                        </div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-title">Temperature</div>
                        <div class="info-card-value" id="temp-display">-50°C</div>
                    </div>
                </div>

                <div class="info-panel" style="margin-top: 15px;">
                    <div class="info-card">
                        <div class="info-card-title">Kinetic Energy</div>
                        <div class="info-card-value" id="ke-display">Low</div>
                    </div>
                    <div class="info-card">
                        <div class="info-card-title">Potential Energy</div>
                        <div class="info-card-value" id="pe-display">Low</div>
                    </div>
                </div>

                <div class="phase-message" id="phase-message"></div>
            </div>
        </div>

        <div class="controls-grid">
            <div class="control-group">
                <div class="control-label">
                    <span>Heat Energy</span>
                    <span class="control-value" id="temp-value">0 kJ</span>
                </div>
                <input type="range" id="temperature-slider" min="0" max="100" value="10" step="0.5">
            </div>

            <div class="control-group">
                <div class="control-label">
                    <span>Simulation Speed</span>
                    <span class="control-value" id="speed-value">1.0x</span>
                </div>
                <input type="range" id="speed-slider" min="0.1" max="3" value="1" step="0.1">
            </div>

            <div class="control-group">
                <div class="control-label">
                    <span>Zoom Level</span>
                    <span class="control-value" id="zoom-value">1.0x</span>
                </div>
                <input type="range" id="zoom-slider" min="0.5" max="3" value="1" step="0.1">
            </div>

            <div class="control-group">
                <div class="button-group">
                    <button id="play-pause-btn">Pause</button>
                    <button id="reset-btn">Reset</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Canvas setup
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        const heatingCurveCanvas = document.getElementById('heating-curve-canvas');
        const hcCtx = heatingCurveCanvas.getContext('2d');

        // Set canvas size
        function resizeCanvas() {
            const container = document.getElementById('canvas-container');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            
            heatingCurveCanvas.width = heatingCurveCanvas.offsetWidth;
            heatingCurveCanvas.height = heatingCurveCanvas.offsetHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Physics constants
        const CONTAINER_WIDTH = 500;
        const CONTAINER_HEIGHT = 400;
        const PARTICLE_COUNT = 150;
        const PARTICLE_RADIUS = 4;
        const LATTICE_SPACING = 15;

        // Temperature thresholds
        const MELTING_POINT = 0;
        const BOILING_POINT = 100;
        const PHASE_TRANSITION_RANGE = 10;

        // Simulation state
        let particles = [];
        let heatEnergy = 10; // Heat energy in kJ (0-100 scale)
        let temperature = -50; // Calculated from heat energy
        let simulationSpeed = 1.0;
        let isPaused = false;
        let zoom = 1.0;
        let offsetX = 0;
        let offsetY = 0;
        let isDragging = false;
        let lastMouseX = 0;
        let lastMouseY = 0;

        // Convert heat energy to temperature based on heating curve
        function calculateTemperature(energy) {
            // Heating curve segments:
            // 0-20: Solid heating (-100°C to 0°C)
            // 20-35: Melting (0°C constant)
            // 35-55: Liquid heating (0°C to 100°C)
            // 55-75: Boiling (100°C constant)
            // 75-100: Gas heating (100°C to 200°C)
            
            if (energy < 20) {
                // Solid heating: -100 to 0°C
                return -100 + (energy / 20) * 100;
            } else if (energy < 35) {
                // Melting plateau: 0°C
                return 0;
            } else if (energy < 55) {
                // Liquid heating: 0 to 100°C
                return ((energy - 35) / 20) * 100;
            } else if (energy < 75) {
                // Boiling plateau: 100°C
                return 100;
            } else {
                // Gas heating: 100 to 200°C
                return 100 + ((energy - 75) / 25) * 100;
            }
        }

        // Particle class
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = 0;
                this.vy = 0;
                this.homeX = x;
                this.homeY = y;
                this.neighbors = [];
            }

            update(state, dt) {
                const GRAVITY = 0.15;
                
                if (state === 'solid' || state === 'melting') {
                    // Solid/melting: vibrate around home position
                    const meltProgress = state === 'melting' ? (temperature - (MELTING_POINT - PHASE_TRANSITION_RANGE)) / (2 * PHASE_TRANSITION_RANGE) : 0;
                    const amplitude = Math.max(0.5, (temperature + 100) / 100 * 2);
                    
                    this.vx += (Math.random() - 0.5) * amplitude;
                    this.vy += (Math.random() - 0.5) * amplitude;
                    
                    // Spring force to home (weakens during melting)
                    const springStrength = 0.15 * (1 - meltProgress * 0.8);
                    const dx = this.homeX - this.x;
                    const dy = this.homeY - this.y;
                    this.vx += dx * springStrength;
                    this.vy += dy * springStrength;
                    
                    // Gravity affects solid too (pulls the whole lattice down)
                    this.vy += GRAVITY * 0.5;
                    
                    // Damping
                    this.vx *= 0.88;
                    this.vy *= 0.88;
                    
                } else if (state === 'liquid') {
                    // LIQUID: Flows like water, maintains surface tension
                    
                    let repelX = 0;
                    let repelY = 0;
                    let nearbyCount = 0;
                    
                    for (let other of particles) {
                        if (other === this) continue;
                        
                        const dx = other.x - this.x;
                        const dy = other.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist > 0 && dist < PARTICLE_RADIUS * 5) {
                            nearbyCount++;
                            
                            // Pressure-based repulsion (prevents compression)
                            if (dist < PARTICLE_RADIUS * 2.2) {
                                const repelForce = (PARTICLE_RADIUS * 2.2 - dist) / (PARTICLE_RADIUS * 2.2) * 0.5;
                                repelX -= (dx / dist) * repelForce;
                                repelY -= (dy / dist) * repelForce;
                            }
                            
                            // Mild cohesion to prevent total spreading
                            if (dist > PARTICLE_RADIUS * 2.5 && dist < PARTICLE_RADIUS * 4) {
                                const cohesionForce = 0.03;
                                repelX += (dx / dist) * cohesionForce;
                                repelY += (dy / dist) * cohesionForce;
                            }
                        }
                    }
                    
                    this.vx += repelX;
                    this.vy += repelY;
                    
                    // Gravity - key for liquid flow
                    this.vy += GRAVITY;
                    
                    // Thermal motion - increases with temperature
                    const thermalEnergy = (temperature - MELTING_POINT) / (BOILING_POINT - MELTING_POINT);
                    this.vx += (Math.random() - 0.5) * 0.2 * thermalEnergy;
                    this.vy += (Math.random() - 0.5) * 0.2 * thermalEnergy;
                    
                    // Viscosity (resistance to flow) - decreases with temperature
                    const viscosity = 0.85 + (0.1 * (1 - thermalEnergy));
                    this.vx *= viscosity;
                    this.vy *= viscosity;
                    
                    // Speed limit
                    const maxSpeed = 3.0;
                    const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (currentSpeed > maxSpeed) {
                        this.vx = (this.vx / currentSpeed) * maxSpeed;
                        this.vy = (this.vy / currentSpeed) * maxSpeed;
                    }
                    
                } else if (state === 'boiling') {
                    // BOILING: Transition from liquid to gas
                    const boilProgress = (temperature - (BOILING_POINT - PHASE_TRANSITION_RANGE)) / (2 * PHASE_TRANSITION_RANGE);
                    
                    let repelX = 0, repelY = 0;
                    
                    for (let other of particles) {
                        if (other === this) continue;
                        const dx = other.x - this.x;
                        const dy = other.y - this.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist > 0 && dist < 40) {
                            // Transition from cohesion to repulsion
                            if (dist < PARTICLE_RADIUS * 2.2) {
                                const repelForce = 0.4;
                                repelX -= (dx / dist) * repelForce;
                                repelY -= (dx / dist) * repelForce;
                            } else if (boilProgress > 0.5) {
                                // Start repelling as we approach gas
                                const repelForce = 0.2 * (boilProgress - 0.5) * 2;
                                repelX -= (dx / dist) * repelForce;
                                repelY -= (dy / dist) * repelForce;
                            } else {
                                // Still some cohesion
                                const cohesionForce = 0.02 * (1 - boilProgress * 2);
                                repelX += (dx / dist) * cohesionForce;
                                repelY += (dy / dist) * cohesionForce;
                            }
                        }
                    }
                    
                    this.vx += repelX;
                    this.vy += repelY;
                    
                    // Gravity reduces as particles become gas
                    this.vy += GRAVITY * (1 - boilProgress);
                    
                    // Increase random motion
                    this.vx += (Math.random() - 0.5) * 0.8 * boilProgress;
                    this.vy += (Math.random() - 0.5) * 0.8 * boilProgress;
                    
                    // Reduce viscosity
                    const viscosity = 0.85 + (0.14 * (1 - boilProgress));
                    this.vx *= viscosity;
                    this.vy *= viscosity;
                    
                    // Speed limit increases during boiling
                    const maxSpeed = 3.0 + (5.0 * boilProgress);
                    const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    if (currentSpeed > maxSpeed) {
                        this.vx = (this.vx / currentSpeed) * maxSpeed;
                        this.vy = (this.vy / currentSpeed) * maxSpeed;
                    }
                    
                } else if (state === 'gas') {
                    // GAS: Fast-moving, spread out, straight-line motion
                    
                    // Minimal damping - maintain velocity
                    this.vx *= 0.998;
                    this.vy *= 0.998;
                    
                    // Strong repulsion - gas particles push away from each other
                    for (let other of particles) {
                        if (other === this) continue;
                        const dx = this.x - other.x;
                        const dy = this.y - other.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 35 && dist > 0) {
                            const force = 1.2 / (dist * dist);
                            this.vx += (dx / dist) * force;
                            this.vy += (dy / dist) * force;
                        }
                    }
                    
                    // Very weak gravity on gas
                    this.vy += GRAVITY * 0.05;
                    
                    // Ensure particles keep moving
                    const currentSpeed = Math.sqrt(this.vx * this.vx + this.vy * this.vy);
                    const minSpeed = 2.5;
                    const targetSpeed = 4.0 + (temperature - 100) / 30;
                    
                    if (currentSpeed < minSpeed) {
                        // Re-energize slow particles
                        const angle = Math.random() * Math.PI * 2;
                        this.vx = Math.cos(angle) * targetSpeed;
                        this.vy = Math.sin(angle) * targetSpeed;
                    }
                    
                    // High speed limit
                    const maxSpeed = 8;
                    if (currentSpeed > maxSpeed) {
                        this.vx = (this.vx / currentSpeed) * maxSpeed;
                        this.vy = (this.vy / currentSpeed) * maxSpeed;
                    }
                }

                // Update position
                this.x += this.vx * dt;
                this.y += this.vy * dt;

                // Wall collisions - elastic bounces
                if (this.x - PARTICLE_RADIUS < 0) {
                    this.x = PARTICLE_RADIUS;
                    this.vx = Math.abs(this.vx) * 0.8;
                }
                if (this.x + PARTICLE_RADIUS > CONTAINER_WIDTH) {
                    this.x = CONTAINER_WIDTH - PARTICLE_RADIUS;
                    this.vx = -Math.abs(this.vx) * 0.8;
                }
                if (this.y - PARTICLE_RADIUS < 0) {
                    this.y = PARTICLE_RADIUS;
                    this.vy = Math.abs(this.vy) * 0.8;
                }
                if (this.y + PARTICLE_RADIUS > CONTAINER_HEIGHT) {
                    this.y = CONTAINER_HEIGHT - PARTICLE_RADIUS;
                    this.vy = -Math.abs(this.vy) * 0.8;
                }
            }

            draw(ctx, state) {
                // Draw particle
                ctx.beginPath();
                ctx.arc(this.x, this.y, PARTICLE_RADIUS, 0, Math.PI * 2);
                
                const gradient = ctx.createRadialGradient(
                    this.x - 1, this.y - 1, 0,
                    this.x, this.y, PARTICLE_RADIUS
                );
                
                if (state === 'solid') {
                    gradient.addColorStop(0, '#80e0ff');
                    gradient.addColorStop(1, '#4cc9f0');
                } else if (state === 'liquid') {
                    gradient.addColorStop(0, '#80b4ff');
                    gradient.addColorStop(1, '#4895ef');
                } else {
                    gradient.addColorStop(0, '#ff8fb4');
                    gradient.addColorStop(1, '#f72585');
                }
                
                ctx.fillStyle = gradient;
                ctx.fill();
                
                // Glow effect
                ctx.shadowBlur = 5;
                ctx.shadowColor = gradient;
                ctx.fill();
                ctx.shadowBlur = 0;
            }
        }

        // Initialize particles in lattice
        function initializeParticles() {
            particles = [];
            const cols = Math.floor(Math.sqrt(PARTICLE_COUNT * 1.3));
            const rows = Math.ceil(PARTICLE_COUNT / cols);
            const startX = (CONTAINER_WIDTH - (cols - 1) * LATTICE_SPACING) / 2;
            // Start near the bottom instead of middle
            const startY = CONTAINER_HEIGHT - (rows * LATTICE_SPACING) - 20;

            for (let i = 0; i < PARTICLE_COUNT; i++) {
                const col = i % cols;
                const row = Math.floor(i / cols);
                const x = startX + col * LATTICE_SPACING;
                const y = startY + row * LATTICE_SPACING;
                particles.push(new Particle(x, y));
            }
        }

        // Get current state
        function getState() {
            if (temperature < MELTING_POINT - PHASE_TRANSITION_RANGE) {
                return 'solid';
            } else if (temperature < MELTING_POINT + PHASE_TRANSITION_RANGE) {
                return 'melting';
            } else if (temperature < BOILING_POINT - PHASE_TRANSITION_RANGE) {
                return 'liquid';
            } else if (temperature < BOILING_POINT + PHASE_TRANSITION_RANGE) {
                return 'boiling';
            } else {
                return 'gas';
            }
        }

        // Get blend factor for transitions
        function getStateBlend() {
            const state = getState();
            if (state === 'melting') {
                return (temperature - (MELTING_POINT - PHASE_TRANSITION_RANGE)) / (2 * PHASE_TRANSITION_RANGE);
            } else if (state === 'boiling') {
                return (temperature - (BOILING_POINT - PHASE_TRANSITION_RANGE)) / (2 * PHASE_TRANSITION_RANGE);
            }
            return state === 'solid' ? 0 : state === 'liquid' ? 0 : 1;
        }

        // Draw bonds
        function drawBonds(ctx, state) {
            if (state === 'gas') return;

            const bondDistance = state === 'solid' ? LATTICE_SPACING * 1.5 : PARTICLE_RADIUS * 6;
            
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.lineWidth = 1;

            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[j].x - particles[i].x;
                    const dy = particles[j].y - particles[i].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);

                    if (dist < bondDistance) {
                        const opacity = state === 'solid' ? 0.3 : 0.15 * (1 - dist / bondDistance);
                        ctx.strokeStyle = `rgba(255, 255, 255, ${opacity})`;
                        ctx.beginPath();
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // Handle particle collisions
        function handleCollisions() {
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[j].x - particles[i].x;
                    const dy = particles[j].y - particles[i].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const minDist = PARTICLE_RADIUS * 2;

                    if (dist < minDist) {
                        // Collision response
                        const angle = Math.atan2(dy, dx);
                        const targetX = particles[i].x + Math.cos(angle) * minDist;
                        const targetY = particles[i].y + Math.sin(angle) * minDist;
                        
                        const ax = (targetX - particles[j].x) * 0.05;
                        const ay = (targetY - particles[j].y) * 0.05;
                        
                        particles[i].vx -= ax;
                        particles[i].vy -= ay;
                        particles[j].vx += ax;
                        particles[j].vy += ay;
                    }
                }
            }
        }

        // Animation loop
        function animate() {
            if (!isPaused) {
                // Calculate temperature from heat energy
                temperature = calculateTemperature(heatEnergy);
                
                const state = getState();
                const dt = simulationSpeed;

                // Update particles
                particles.forEach(p => p.update(state, dt));
                handleCollisions();

                // Clear and draw
                ctx.fillStyle = 'rgba(10, 14, 39, 0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Save context
                ctx.save();
                
                // Apply camera transform
                const centerX = canvas.width / 2;
                const centerY = canvas.height / 2;
                ctx.translate(centerX, centerY);
                ctx.scale(zoom, zoom);
                ctx.translate(-CONTAINER_WIDTH / 2 + offsetX, -CONTAINER_HEIGHT / 2 + offsetY);

                // Draw container
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.lineWidth = 2;
                ctx.strokeRect(0, 0, CONTAINER_WIDTH, CONTAINER_HEIGHT);

                // Draw bonds first
                drawBonds(ctx, state);

                // Draw particles
                particles.forEach(p => p.draw(ctx, state));

                // Restore context
                ctx.restore();
            }

            drawHeatingCurve();
            updateUI();
            requestAnimationFrame(animate);
        }

        // Draw heating curve
        function drawHeatingCurve() {
            const w = heatingCurveCanvas.width;
            const h = heatingCurveCanvas.height;
            const padding = 50;
            const graphWidth = w - padding * 2;
            const graphHeight = h - padding * 2;

            // Clear
            hcCtx.fillStyle = 'rgba(10, 14, 39, 0.4)';
            hcCtx.fillRect(0, 0, w, h);

            // Draw axes
            hcCtx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
            hcCtx.lineWidth = 2;
            hcCtx.beginPath();
            hcCtx.moveTo(padding, padding);
            hcCtx.lineTo(padding, h - padding);
            hcCtx.lineTo(w - padding, h - padding);
            hcCtx.stroke();

            // Labels
            hcCtx.fillStyle = '#a5adc8';
            hcCtx.font = '12px "JetBrains Mono"';
            hcCtx.textAlign = 'center';
            hcCtx.fillText('Heat Energy (kJ)', w / 2, h - 10);
            
            hcCtx.save();
            hcCtx.translate(15, h / 2);
            hcCtx.rotate(-Math.PI / 2);
            hcCtx.fillText('Temperature (°C)', 0, 0);
            hcCtx.restore();

            // Temperature range: -100 to 200
            const tempToY = (temp) => {
                return h - padding - ((temp + 100) / 300) * graphHeight;
            };

            const energyToX = (energy) => {
                return padding + (energy / 100) * graphWidth;
            };

            // Draw heating curve segments
            hcCtx.strokeStyle = '#00d4ff';
            hcCtx.lineWidth = 3;
            hcCtx.beginPath();

            // Solid heating (-100 to 0)
            hcCtx.moveTo(energyToX(0), tempToY(-100));
            hcCtx.lineTo(energyToX(20), tempToY(0));

            // Melting plateau (0 to 0)
            hcCtx.lineTo(energyToX(35), tempToY(0));

            // Liquid heating (0 to 100)
            hcCtx.lineTo(energyToX(55), tempToY(100));

            // Boiling plateau (100 to 100)
            hcCtx.lineTo(energyToX(75), tempToY(100));

            // Gas heating (100 to 200)
            hcCtx.lineTo(energyToX(100), tempToY(200));

            hcCtx.stroke();

            // Draw current position using heat energy
            const cx = energyToX(heatEnergy);
            const cy = tempToY(temperature);

            // Pulsing circle
            const pulseSize = 3 + Math.sin(Date.now() / 200) * 2;
            
            hcCtx.beginPath();
            hcCtx.arc(cx, cy, pulseSize + 3, 0, Math.PI * 2);
            hcCtx.fillStyle = 'rgba(157, 78, 221, 0.3)';
            hcCtx.fill();
            
            hcCtx.beginPath();
            hcCtx.arc(cx, cy, pulseSize, 0, Math.PI * 2);
            hcCtx.fillStyle = '#9d4edd';
            hcCtx.fill();

            // Draw temperature reading next to the point
            hcCtx.font = 'bold 14px "JetBrains Mono"';
            hcCtx.textAlign = 'left';
            const tempText = Math.round(temperature) + '°C';
            
            // Position the text to the right of the point
            let textX = cx + 15;
            let textY = cy + 5;
            
            // If too close to right edge, put it on the left
            if (textX + 50 > w - padding) {
                textX = cx - 15;
                hcCtx.textAlign = 'right';
            }
            
            // Draw background for text
            const metrics = hcCtx.measureText(tempText);
            const textWidth = metrics.width;
            const textHeight = 16;
            
            hcCtx.fillStyle = 'rgba(10, 14, 39, 0.9)';
            if (hcCtx.textAlign === 'right') {
                hcCtx.fillRect(textX - textWidth - 4, textY - textHeight + 2, textWidth + 8, textHeight + 4);
            } else {
                hcCtx.fillRect(textX - 4, textY - textHeight + 2, textWidth + 8, textHeight + 4);
            }
            
            hcCtx.fillStyle = '#00d4ff';
            hcCtx.fillText(tempText, textX, textY);

            // Grid lines for phase boundaries
            hcCtx.strokeStyle = 'rgba(255, 255, 255, 0.1)';
            hcCtx.lineWidth = 1;
            hcCtx.setLineDash([5, 5]);
            
            // Melting point
            hcCtx.beginPath();
            hcCtx.moveTo(padding, tempToY(0));
            hcCtx.lineTo(w - padding, tempToY(0));
            hcCtx.stroke();
            
            // Boiling point
            hcCtx.beginPath();
            hcCtx.moveTo(padding, tempToY(100));
            hcCtx.lineTo(w - padding, tempToY(100));
            hcCtx.stroke();
            
            hcCtx.setLineDash([]);
        }

        // Update UI
        function updateUI() {
            const state = getState();
            
            // State display
            const stateDisplay = document.getElementById('state-display');
            let stateHTML = '';
            if (state === 'solid') {
                stateHTML = '<span class="state-indicator state-solid">Solid</span>';
            } else if (state === 'melting') {
                stateHTML = '<span class="state-indicator state-melting">Melting</span>';
            } else if (state === 'liquid') {
                stateHTML = '<span class="state-indicator state-liquid">Liquid</span>';
            } else if (state === 'boiling') {
                stateHTML = '<span class="state-indicator state-boiling">Boiling</span>';
            } else {
                stateHTML = '<span class="state-indicator state-gas">Gas</span>';
            }
            stateDisplay.innerHTML = stateHTML;

            // Temperature
            document.getElementById('temp-display').textContent = Math.round(temperature) + '°C';

            // Energy levels
            const kineticEnergy = Math.max(0, (temperature + 100) / 300);
            let keLevel = kineticEnergy < 0.3 ? 'Low' : kineticEnergy < 0.6 ? 'Medium' : 'High';
            document.getElementById('ke-display').textContent = keLevel;

            let peLevel = 'Low';
            if (state === 'melting' || state === 'boiling') {
                peLevel = 'Increasing';
            } else if (state === 'liquid') {
                peLevel = 'Medium';
            } else if (state === 'gas') {
                peLevel = 'High';
            }
            document.getElementById('pe-display').textContent = peLevel;

            // Phase messages
            const phaseMessage = document.getElementById('phase-message');
            if (state === 'melting') {
                phaseMessage.textContent = '⚡ Energy is being used to break intermolecular bonds. Temperature remains constant during melting.';
                phaseMessage.classList.add('active');
            } else if (state === 'boiling') {
                phaseMessage.textContent = '⚡ Energy is being used to overcome intermolecular forces. Temperature remains constant during boiling.';
                phaseMessage.classList.add('active');
            } else {
                phaseMessage.classList.remove('active');
            }

            // Heating/cooling indicators
            const heatingIndicator = document.getElementById('heating-indicator');
            const coolingIndicator = document.getElementById('cooling-indicator');
            
            if (heatEnergy > 50) {
                heatingIndicator.classList.add('active');
                coolingIndicator.classList.remove('active');
            } else if (heatEnergy < 25) {
                heatingIndicator.classList.remove('active');
                coolingIndicator.classList.add('active');
            } else {
                heatingIndicator.classList.remove('active');
                coolingIndicator.classList.remove('active');
            }
        }

        // Controls
        document.getElementById('temperature-slider').addEventListener('input', (e) => {
            heatEnergy = parseFloat(e.target.value);
            temperature = calculateTemperature(heatEnergy);
            document.getElementById('temp-value').textContent = heatEnergy.toFixed(1) + ' kJ';
        });

        document.getElementById('speed-slider').addEventListener('input', (e) => {
            simulationSpeed = parseFloat(e.target.value);
            document.getElementById('speed-value').textContent = simulationSpeed.toFixed(1) + 'x';
        });

        document.getElementById('zoom-slider').addEventListener('input', (e) => {
            zoom = parseFloat(e.target.value);
            document.getElementById('zoom-value').textContent = zoom.toFixed(1) + 'x';
        });

        document.getElementById('play-pause-btn').addEventListener('click', () => {
            isPaused = !isPaused;
            document.getElementById('play-pause-btn').textContent = isPaused ? 'Play' : 'Pause';
        });

        document.getElementById('reset-btn').addEventListener('click', () => {
            heatEnergy = 10;
            temperature = calculateTemperature(heatEnergy);
            document.getElementById('temperature-slider').value = 10;
            document.getElementById('temp-value').textContent = '10.0 kJ';
            offsetX = 0;
            offsetY = 0;
            zoom = 1;
            document.getElementById('zoom-slider').value = 1;
            document.getElementById('zoom-value').textContent = '1.0x';
            initializeParticles();
        });

        // Pan controls
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            lastMouseX = e.clientX;
            lastMouseY = e.clientY;
        });

        canvas.addEventListener('mousemove', (e) => {
            if (isDragging) {
                const dx = e.clientX - lastMouseX;
                const dy = e.clientY - lastMouseY;
                offsetX += dx / zoom;
                offsetY += dy / zoom;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
            }
        });

        canvas.addEventListener('mouseup', () => {
            isDragging = false;
        });

        canvas.addEventListener('mouseleave', () => {
            isDragging = false;
        });

        // Touch support
        canvas.addEventListener('touchstart', (e) => {
            if (e.touches.length === 1) {
                isDragging = true;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
                e.preventDefault();
            }
        });

        canvas.addEventListener('touchmove', (e) => {
            if (isDragging && e.touches.length === 1) {
                const dx = e.touches[0].clientX - lastMouseX;
                const dy = e.touches[0].clientY - lastMouseY;
                offsetX += dx / zoom;
                offsetY += dy / zoom;
                lastMouseX = e.touches[0].clientX;
                lastMouseY = e.touches[0].clientY;
                e.preventDefault();
            }
        });

        canvas.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Initialize and start
        initializeParticles();
        animate();
    </script>
</body>
</html>
